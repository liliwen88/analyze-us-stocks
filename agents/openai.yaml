interface:
  display_name: "美股综合分析"
  short_description: "用最新行情、财报和新闻生成概率化美股研判"
  default_prompt: "Use $analyze-us-stocks to analyze a US stock with current data, source-graded evidence, probability scenarios, a concise action view, and risks."

dependencies:
  tools:
    - type: "mcp"
      value: "yahoo-finance"
      description: "Structured quote, history, fundamentals, holders, and options data when configured."
    - type: "mcp"
      value: "finnhub"
      description: "Quotes, company news, fundamentals, SEC filings, insider transactions, analyst trends, and ESG data when configured."
    - type: "mcp"
      value: "alpha-vantage"
      description: "Market data, technical indicators, and macro series when configured."

policy:
  allow_implicit_invocation: true
